version: '3.8'

services:
  account-service:
    build: ./accounts-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway-service:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - ACCOUNT_SERVICE_URL=http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s