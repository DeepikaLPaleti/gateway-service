server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:gatewaydb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

account:
  service:
    url: http://localhost:8081
